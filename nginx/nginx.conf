upstream django_app {
    server web:8000;
}

# Preserve the original scheme supplied by the TLS-terminating reverse proxy.
# Fall back to this nginx hop's scheme for direct/local requests.
map $http_x_forwarded_proto $original_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {

    listen 80;

    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $original_forwarded_proto;
        proxy_set_header Host $host;
        client_max_body_size 1m;
        proxy_redirect off;
    }

    location /static/ {
        alias /home/app/web/static/;
    }
}
